name: CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  test-django:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django tests
        run: python manage.py test

      - name: Notify Jira on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.JIRA_BASE_URL }}/rest/api/2/issue/" \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": {"key": "${{ secrets.JIRA_PROJECT_KEY }}"},
                "summary": "CI Failure (Django): ${{ github.repository }} on ${{ github.ref_name }} [${{ github.sha }}]",
                "description": "Django pipeline failed.\n\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "issuetype": {"name": "Bug"},
                "priority": {"name": "High"}
              }
            }'

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: test-django
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DOCR
        run: echo "${{ secrets.DO_API_TOKEN }}" | docker login registry.digitalocean.com -u doctl --password-stdin

      - name: Build and push image
        run: |
          IMAGE=registry.digitalocean.com/${{ secrets.DOCR_REGISTRY }}/${{ github.event.repository.name }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
