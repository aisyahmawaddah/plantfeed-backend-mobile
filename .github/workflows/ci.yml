name: CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
    test-django:
      runs-on: ubuntu-latest
      services:
        mysql:
          image: mysql:8.0
          env:
            MYSQL_ROOT_PASSWORD: ''
            MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
            MYSQL_DATABASE: newplantfeed2
          ports:
            - 3306:3306
          options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      steps:
        - uses: actions/checkout@v4
  
        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"
  
        - name: Install dependencies
          run: pip install -r requirements.txt
  
        - name: Run Django tests
          env:
            DATABASE_NAME: 'newplantfeed2'
            DATABASE_USER: 'root'
            DATABASE_PASSWORD: ''
            DATABASE_HOST: '127.0.0.1'
            DATABASE_PORT: '3306'
            STRIPE_SECRET_KEY: 'sk_test_dummy'
            STRIPE_PUBLIC_KEY: 'pk_test_dummy'
            STRIPE_WEBHOOK_SECRET: 'whsec_dummy'
            CSRF_COOKIE_SECURE: 'False'
            SESSION_COOKIE_SECURE: 'False'
          run: python manage.py test --verbosity=2

  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: test-django
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to DOCR
        run: echo "${{ secrets.DO_API_TOKEN }}" | docker login registry.digitalocean.com -u doctl --password-stdin

      - name: Build and push image
        run: |
          IMAGE=registry.digitalocean.com/${{ secrets.DOCR_REGISTRY }}/${{ github.event.repository.name }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
